services:

  process_exporter:
    image: ncabatoff/process-exporter
    container_name: process_exporter
    ports:
      - "9256:9256"
    privileged: true
    command: -procfs /host/proc -config.path /config/process-exporter.yml
    restart: unless-stopped
    volumes:
      - /proc:/host/proc
      - ./process_exporter/process-exporter.yml:/config/process-exporter.yml

  cadvisor_exporter:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor_exporter
    ports:
    - 15001:8080
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:rw
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro

  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    command:
      - '--path.rootfs=/host'
    network_mode: host
    pid: host
    restart: unless-stopped
    volumes:
      - '/:/host'