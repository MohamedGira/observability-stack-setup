global:
  scrape_interval: 15s
  scrape_timeout: 10s
  

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  - job_name: 'node_exporter'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/node.json
    relabel_configs:
        - source_labels: [__address__]
          regex: "([^:]+):.*"
          target_label: "host"

  - job_name: 'process_exporter'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/process.json
    relabel_configs:
        - source_labels: [__address__]
          regex: "([^:]+):.*"
          target_label: "host"
  
  - job_name: 'container_exporter'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/container.json
    relabel_configs:
        - source_labels: [__address__]
          regex: "([^:]+):.*"
          target_label: "host"

rule_files:
  - "/etc/prometheus/alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "localhost:9093"